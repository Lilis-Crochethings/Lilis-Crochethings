lastUpdated: "July 2026"
intro: "This page explains what information Lili's Crochethings collects when you use this site, and why. This site is a personal hobby project, not a business collecting data for marketing or resale — this policy exists so you know exactly what happens to anything you send through the [contact form](/contact)."
sections:
  - heading: "What I collect"
    body: "Only what you enter into the [contact form](/contact): your name, email address, the category and subject you pick, and the message itself. I don't use cookies, analytics, or any tracking scripts anywhere on this site."
  - heading: "Why I collect it"
    body: "Solely to read and reply to your message. I don't use it for marketing, and I don't sell or share it with anyone beyond what's described below."
  - heading: "Who else sees it"
    body: "Form submissions are delivered to my inbox through [Formspree](https://formspree.io/legal/privacy-policy), a third-party form service. Formspree processes and briefly stores submissions on my behalf according to its own privacy policy — I don't have any other service or person involved in handling your message."
  - heading: "Your rights"
    body: "You can ask me to see, correct, or delete any information you've sent me — just reach out through the [contact form](/contact) or one of the [alternatives](/socials) listed there."
  - heading: "Changes to this policy"
    body: "If what this site collects or how it's handled ever changes, this page will be updated to reflect that."

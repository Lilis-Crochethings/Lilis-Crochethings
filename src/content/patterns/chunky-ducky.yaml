title: "Chunky Ducky"
images:
  - /images/patterns/chunky-ducky/free-pattern-banner.webp
  - /images/patterns/chunky-ducky/finished-duck.webp
  - /images/patterns/chunky-ducky/duck-goose.webp
  # - "/images/creations/Goose-1.webp"
  # - "/images/creations/Goose-2.webp"
description: |-
  Meet the Chunky Ducky—a quick, squishy project that's as fun to make as it is to display! Whether you choose classic yellow, playful pastel shades, or white for an adorable goose, this pattern is perfect for creating your own feathered friend.

  Using super bulky yarn and a 4 mm crochet hook, this beginner-friendly pattern works up in under an hour, making it a great last-minute gift, market make, or satisfying weekend project. Mix and match colors to create your own flock of unique rubber duckies, or turn it into a cute goose with just a simple color swap.

  Looking for something a little more realistic? Be sure to check out the Mallard Duck variant for another fun twist on this pattern!
difficulty: easy
date: 2026-02-07
uploadDate: 2026-07-16
lastModified: 2026-07-15
hoursSpent: 1
hookSize: 4mm
type: crochet
subtypes:
  - amigurumi
tags:
  - duck
  - goose

searchTerms:
  - Plushie
  - Jumbo Ducky
  - Jumbo Duck
  - Jumbo Goose

materials:
  items:
    - scissors
    - needle
    - stitch-marker
    - stuffing
  safetyEyes:
    - size: 6mm
      amount: 2
  hooks: # Can list multiple
    - 4mm
  colorPreviewBase: /images/patterns/chunky-ducky/color-preview/base.webp
  yarns:
    - id: body
      info: Color that is used for the body
      name: "yellow"
      yarn: "Baby Snuggle Solid - Sunshine"
      color: &bodyText # Anchored so pattern instructions below can reference this exact pair via *bodyText — shown on the materials swatch too, so it's the one color that has to stay legible against both themes
        light: "#2b2b2b"
        dark: "#f2e7ea"
      amount: 25g # If there is no amount present, just fall back to display the color only
      weight: super-bulky
      mask: /images/patterns/chunky-ducky/color-preview/body-mask.webp
    - id: beak
      info: Color that is used for the beak
      name: "orange"
      color: &beakText
        light: "#C45927"
        dark: "#e8935c"
      weight: super-bulky
      amount: Scraps
      yarn: "Honey Bunny - Gold Dust"
      mask: /images/patterns/chunky-ducky/color-preview/beak-mask.webp


abbreviations: [mr, sc, inc, dec, slst, ch, hdc, flo, blo, tw, '()', '[]']

pattern:
  - part: Body
    worked-in: rounds
    info: The entire project is made with a 4mm hook. The body is worked in rounds in the color [body].
    color: *bodyText # Color can be defined on entire part, then all lines (row/round) are in this color
    instructions: # Will automatically be shown as Round 1, 2, 3... (Count only lines! info, warnings and images are not counted)
      # - line: # Lines can split instructions into multiple segments when color changes need to happen in a single row/round. They then need to be appended to each other to form a single instruction line with the parts in their set colors.
      #   - text: MR with
      #     color: *bodyText # Color can then be defined per segment of the row/round
      #   - text: 8 SC
      #     color: *beakText
      #   total: 8
      # - line:
      #   - text: 8 INC
      #     color: *bodyText
      #   total: 16
      - line: MR with 8 SC
        total: 8
      - line: 8 INC
        total: 16
      - line: (1 SC, 1 INC) x8
        #color: *beakText # Deeper defined colors overwrite the color defined at the top
        total: 24
      - line: (3 SC, 1 INC) x6
        total: 30
      - line: (4 SC, 1 INC) x6
        total: 36
      - line: "FLO: [1 SLST, 2 CH, 2 HDC], ALL: 10 SC, FLO: [2 HDC, 2 CH, 1 SLST], ALL: 24 SC"
        total: 36
        info: The wings are worked in the front loops only, the rest is through both loops. # Can be when a certain instruction line needs some extra information (info icon)
        images: # Can be multiple -> inserted as part of this instruction line
          - /images/patterns/chunky-ducky/round-6.webp
      - line: "BLO: 1 SC, ALL: 10 SC, BLO: 1 SC, ALL: 24 SC"
        info: Work in the back loops when passing the wings
      - block: 4 # A block is a single line repeated x times
        line: 36 SC
        total: 36
      - line: (4 SC, 1 DEC) x6
        total: 30
      - line: (3 SC, 1 DEC) x6
        total: 24
      - line: (1 SC, 1 DEC) x8
        total: 16
      - info: Start stuffing the body # When a general instruction is inserted in between the rounds/rows of the instructions
      - line: 8 DEC
        total: 8
      - info: Close off the hole and weave in the ends
        images: # inserted as part of this instruction line
          - /images/patterns/chunky-ducky/body-full.webp



  - part: Head
    worked-in: rounds
    info: The head is also worked in rounds in [body].
    color: *bodyText
    instructions:
      - line: MR with 8 SC
        total: 8
      - line: 8 INC
        total: 8
      - block: 3 # A block is a single line repeated x times
        line: 16 SC
        total: 16

  - part: Beak
    worked-in: rows
    info: Now we'll start with the beak, so pick up your [beak] yarn. It takes up 4 stitches of space between rounds 4 and 5 of the head. # General info at the top of the card
    color: *beakText
    instructions:  # Will automatically be shown as Row 1, 2, 3...
      - info: Turn the head so the magic ring is at the top. Insert the hook horizontally between round 4 and 5. Pick up the yarn and pull through. Then chain 1 to attach it to the head.
        images: # Images part of the extra info box
          - /images/patterns/chunky-ducky/insert-hook-yarn.webp
      - line: 2 SC, 1 SLST, TW
        # total: 4
        images:
          - /images/patterns/chunky-ducky/beak-first-row.webp
      - line: Skip 1 stitch, 2 SC, 1 SLST
        info: The last slipstitch goes into the first chain we made
        # total: 3
        images:
          - /images/patterns/chunky-ducky/beak-second-row.webp
      - info: Weave in the ends of the beak and insert the safety eyes between round 4 and 5, one stitch away from the beak.
        images:
          - /images/patterns/chunky-ducky/head-with-beak.webp

  - part: Head (continued)
    color: *bodyText
    worked-in: rounds
    info: We'll now continue on the last round of the head, so we switch back to our [body] yarn.
    instructions:
      - line: 8 DEC
        total: 8
      - info: Stuff the head. Finish off and leave a tail for sewing # TODO: discuss a checkable "step" entry type for cases like this

  - part: Assembly
    # Can also be that it is not worked in rounds or rows, then don't insert round/row x: in front. Then it's just general lines of instructions
    instructions:
      - info: Sew the head onto the body between rounds 2 and 5.
        images:
          - /images/patterns/chunky-ducky/body-pins.webp

outro:
  - text: Congratulations on finishing your very own Chunky Ducky! 🦆 Whether you made a classic rubber ducky, a cute little goose, or came up with your own unique color combination, I hope you had as much fun crocheting it as I had designing it.
  - images:
    - /images/patterns/chunky-ducky/finished-duck.webp
    - /images/patterns/chunky-ducky/duck-goose.webp

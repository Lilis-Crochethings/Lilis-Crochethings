description: |-
  I first tried the same pattern of the [Sousplat Atacama](/creations/sousplat-atacama), but I thought it didn't really hit the same in acrylic yarn, which made the coaster way too thin.

  I then tried a second type of coaster when I found a short tutorial on Pinterest (I've linked the original video though, not the repost). I was more satisfied with this one, but in black you can't really see the stiches that well. (I really had to put flash on and alter the images to make it possible to see the stitches 😅).

  I then found this GORGEOUS yarn in one of my local stores (Zeeman), that was this brown-white gradient yarn with a hint of gold ([see it here](https://www.instagram.com/s/aGlnaGxpZ2h0OjE3OTY3OTIzNDU5OTI1MTM3?story_media_id=3849242881517520634_69091870456&igsh=NTY3bDg1azVvZ3Vk)). I fell in LOVE with this yarn. Bought 2 skeins, just to make coasters with 😂. I immediately made 8 of them, so now I definitely have enough coasters when my friends come over! (The time is per coaster.)

  However, since I was working with gradient yarn, it didn't look that pretty to go in rounds. That's why I decided to alternate rounds in between to keep the gradient effect better. I've also linked my way of doing it as a pattern for you to try out!

description: |-
  I know this isn't crochet, but I was super excited to try out cross stitch embroidery for the first time! I think it would be really cool to embroider on clothing in the future as well, but I thought it would be best to practice my skills first on an old bag that shrunk in the wash anyway 😅.

  This was my first attempt at cross stitch embroidery. I didn't have a waste canvas or water soluble canvas, so I just drew on the grid myself with heat erasable pens (Frixion), which may have resulted in some uneven stitches. Either way I'm super proud of how my first attempt turned out. What do we think? 😁

  Looking forward to the other Winx on my bag as well!

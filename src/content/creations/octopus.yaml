description: |-
  This is my first every amigurumi project. I did make the sprout before, so I already got the hang of the basic stitches. You basically only need a single crochet for amigurimi (cope).

  I just used some yarn that I had laying around. I didn't have safety eyes yet, so I just used fome cardigan buttons that I had and sewed them into the head. Whatever works, works.

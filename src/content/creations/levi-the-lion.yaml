description: |-
  This was a pattern test.
  
  The pattern is really fun to work on since you don't have to attach the limbs by sewing, they are crocheted into the body! If you decide to make Levi (the lion) the mane does take some work, but the end result is so worth it!! Just look at him 😍.

  It was an adventure though, because halfway the body I ran out of yarn and it was out of stock 😩. So I started all over again and finished it just in time 😅.
  
  The pattern is released so go check it out!!

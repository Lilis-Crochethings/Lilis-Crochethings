description: |-
  This Funko Pop-like doll is a mini version of myself, wearing one of my most iconic outfits. The people who know me personally will recognize it straight away 😝.
  I had to use a lot of new techniques, like blocking the hair, so I definitely learned a lot with this project. For the base of the doll; I followed a tutorial; but the skirt, the bow and the hair are freestyled 😅.

description: |-
  Seeing my first amigurumi project ([my octopus](/creations/octopus)) was a success, I decided it was time to attempt the impossible. I actually had already bought this faux yarn before I even learned how to crochet. I saw this yarn in the store and thought: I want to learn to crochet so I can make a bunny with this. So I learned to crochet by watching some YouTube video's on basic stitches. Tried one basic amigurumi project and thought yes I'm ready now...

  Safe to say I was not. Damn faux yarn is difficult to work with. You can't see it but my stitch count is completely off. You can't see ANYTHING. But the positive thing is: You can't see your mistakes either 😁.

  I still didn't have safety eyes and my buttons weren't big enough to fit this project, so I freestyled some crochet eyes. I think he looks a bit derpy, but that's okay. I really like my fluffy bunny loaf. Still proud to this day that I was able to pull this off as my second amigurumi project. (And I did it with faux yarn 🙈.)

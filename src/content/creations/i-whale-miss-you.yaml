description: |-
  'I whale miss you' whales 🐳. I made them as a parting gift for my bf and my friends.
  
  We were all studying together, but university came to an end for most of us. So this was my way of saying goodbye and wishing everyone good luck.
  
  I even put magnets in the one from my bf and mine, so they would stick together when brought closer. 🥰

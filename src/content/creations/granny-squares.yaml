title: "Granny Squares"
difficulty: easy
images:
  - "/images/creations/Granny-Squares-1.webp"
description: |-
  Ah yes, it's completely logical to start to learn how to make granny squares AFTER you've made a bunny amigurimi in faux yarn. But you know what, I don't have to be logical 😅.

  Anyway, I used up some more of my scrap yarns that I had laying around. I really wanted to make a sunflower granny square, but I didn't have the correct colors. So I just used yellow, orange and black. Safe to say I was really disappointed with how it turned out. It didn't even look close to a sunflower. But either way, this was a good training for the sunflower bag that I wanted to make.
date: 2023-08-26

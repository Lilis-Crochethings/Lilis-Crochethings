description: |-
  A more true-to-life take on my Chunky Ducky pattern — swapping the classic rubber-duck yellow for a mallard's real colors: an iridescent green head, a warm chestnut-brown body, a crisp white neck ring, and a mustardy bill.

  Same quick, beginner-friendly amigurumi base as the original, just recolored to look like the real thing.

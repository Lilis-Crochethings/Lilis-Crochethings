description: |-
  I really wanted to try cross-stitching on a shirt for the first time. So I asked my bf for an old shirt and for something he would like embroidered on it. He chose a void-chicken, which I should've expected hahah.

  Embroidering on a shirt is way harder than on a stiff tote-bag. The fabric is way more stretchy and if you're not careful, you'll stretch it too far and ruin the shirt.

  I also used water-soluble canvas for this one. After washing it off, it left a stain though. Now I don't know if the black yarn bled, or the waste canvas left a glue stain... Or both. I'm still going to try to get it out. Maybe I used it wrong. I wouldn't know since it didn't come with instructions 😅.

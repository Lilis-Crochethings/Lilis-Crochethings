description: I have been experimenting a bit with different versions of poképouches (bags in the form of a pokéball). I have come up with a loveball design as well as a great ball one (that I still have to improve). However, I already wanted to show my progress and that I'm still crocheting 😝. I also tested out a new type of color change which looks SO clean, but it takes way longer to achieve 🥲. Yet the result is worth it since the regular PokeBall turned out really nice.

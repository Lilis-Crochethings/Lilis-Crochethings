intro:
  - "Did you find an issue on my website or did you spot a mistake in one of my patterns, please let me know! Even if you're stuck on one of my patterns, don't hesitate to ask for help. Did you maybe have another question that is not in the [FAQ](/faq)? That is perfectly fine! That's why I have this contact form ;).\nWhatever the reason, feel free to reach out to me and I'll get back to you as soon as I can."
  - "If you prefer not to communicate over e-mail, you can also check out the alternatives I listed."
categoryOptions:

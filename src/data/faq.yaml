categories:
  - id: general
    title: General
    questions:
      - question: Can I buy one of your crochet or embroidery items?
        answer: >
          Unfortunately, I don't sell my finished creations. However, you're
          welcome to browse the patterns I used so you can make your own!

      - question: Do you take custom commissions?
        answer: >
          No — since I don't sell my finished creations, I don't take
          commissions either. If there's something specific you'd like,
          you can always try making it yourself. I have some patterns available and I also link all patterns that I used for my creations!

      - question: Do you have video tutorials?
        answer: >
          No, I currently only offer written patterns through my interactive
          crochet pattern pages.

      - question: Can I sell items made from your patterns?
        answer: >
          Yes! You're welcome to sell finished items made from my patterns.
          Please credit me as the pattern designer and, if possible, include a
          link back to my website.

      - question: Can I share your patterns?
        answer: >
          You're welcome to share links to my patterns. Please don't repost or
          redistribute the pattern itself. Instead, credit me as the designer
          and link back to the original pattern on my website.

  - id: website
    title: Website
    questions:
      - question: What does the Easy/Medium/Hard label on a pattern mean?
        answer: >
          It's a rough difficulty rating based on how many techniques a
          pattern uses and how fiddly the shaping is, so you can gauge at a
          glance whether it fits your current skill level before diving in.

      - question: What does the "New" badge mean?
        answer: >
          Patterns and creations show a pulsing "New" badge for the first
          two weeks after they're added, so it's easy to spot what's fresh
          without digging through the full list.

      - question: Can I filter or search patterns and creations?
        answer: >
          Yes! The Patterns and Creations pages both have a filter panel
          (tap "Filters" on mobile) to narrow things down by tag,
          difficulty, color, or yarn type, plus sorting by name, date, or
          hours spent. There's also a search bar in the navbar that
          searches patterns, creations, and this FAQ all at once.

      - question: Does the site have a dark mode?
        answer: >
          Yes! Use the theme toggle in the navbar to cycle between Auto
          (matches your device), Light, and Dark.

      - question: Is that your own handwriting as a font?
        answer: >
          Yes! I turned my own handwriting into a font using
          [Calligraphr](https://www.calligraphr.com/). Glad you noticed!

      - question: Where did you get your icons?
        answer: >
          I drew and vectorized most of the icons on this site myself using [Procreate](https://procreate.com/) and [Inkscape](https://inkscape.org/). A couple were made by other talented designers, credited
          below!
